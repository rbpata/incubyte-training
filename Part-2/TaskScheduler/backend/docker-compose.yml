services:
  postgres:
    image: postgres:16
    container_name: task_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_db_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_scheduler_app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/task_db_dev
      LOG_LEVEL: INFO
      HOST: 0.0.0.0
      PORT: 8001
      PYTHONPATH: /app/src
    ports:
      - "8001:8001"
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8001

volumes:
  postgres_data:
