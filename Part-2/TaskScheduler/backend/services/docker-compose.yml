version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ms_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-taskscheduler}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ms_postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskscheduler-network
    security_opt:
      - no-new-privileges:true
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
      cache_from: []
    container_name: ms_auth_service
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-taskscheduler}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HOST: 0.0.0.0
      PORT: 8001
      PYTHONPATH: /app/src
    ports:
      - "${AUTH_SERVICE_PORT:-8001}:8001"
    networks:
      - taskscheduler-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true

  task-service:
    build:
      context: ./task-service
      dockerfile: Dockerfile
      cache_from: []
    container_name: ms_task_service
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-taskscheduler}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HOST: 0.0.0.0
      PORT: 8002
      PYTHONPATH: /app/src
    ports:
      - "${TASK_SERVICE_PORT:-8002}:8002"
    networks:
      - taskscheduler-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
      cache_from: []
    container_name: ms_api_gateway
    restart: always
    depends_on:
      auth-service:
        condition: service_healthy
      task-service:
        condition: service_healthy
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      TASK_SERVICE_URL: http://task-service:8002
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    networks:
      - taskscheduler-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      cache_from: []
    container_name: ms_frontend
    restart: always
    depends_on:
      - api-gateway
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - taskscheduler-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    environment:
      - NGINX_WORKER_PROCESSES=auto
      - NGINX_WORKER_CONNECTIONS=1024

  prometheus:
    image: prom/prometheus:v2.51.0-alpine
    container_name: ms_prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ms_prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--retention.time=30d"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - taskscheduler-network
    depends_on:
      - auth-service
      - task-service
      - api-gateway
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:10.4.2-alpine
    container_name: ms_grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ms_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    networks:
      - taskscheduler-network
    depends_on:
      - prometheus
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ms_postgres_data:
    driver: local
  ms_prometheus_data:
    driver: local
  ms_grafana_data:
    driver: local

networks:
  taskscheduler-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
