global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "production"
    cluster: "taskscheduler-prod"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:8001"]
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: "task-service"
    static_configs:
      - targets: ["task-service:8002"]
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
