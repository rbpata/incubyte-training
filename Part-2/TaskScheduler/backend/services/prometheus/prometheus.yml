global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "local"

scrape_configs:
  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:8001"]
    metrics_path: /metrics

  - job_name: "task-service"
    static_configs:
      - targets: ["task-service:8002"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
