apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskscheduler-ingress
  namespace: taskscheduler
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - taskscheduler.example.com
    secretName: taskscheduler-tls
  rules:
  - host: taskscheduler.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 8000
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 8001
      - path: /tasks
        pathType: Prefix
        backend:
          service:
            name: task-service
            port:
              number: 8002
