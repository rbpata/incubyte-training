apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: taskscheduler
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: db-migration
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      restartPolicy: Never
      containers:
      - name: migrate
        image: taskscheduler/auth-service:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: taskscheduler-config
        - secretRef:
            name: taskscheduler-secrets
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://$(DATABASE_USER):$(DATABASE_PASSWORD)@postgres:5432/taskscheduler"
        command:
        - /bin/sh
        - -c
        - |
          cd /app && uv run alembic upgrade head
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
