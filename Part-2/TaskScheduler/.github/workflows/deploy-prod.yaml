name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - "backend/services/**"
      - "frontend/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  CLUSTER_NAMESPACE: taskscheduler

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    environment:
      name: production
      url: https://taskscheduler.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update image references
        run: |
          REGISTRY=${{ env.REGISTRY }}
          OWNER=${{ github.repository_owner }}
          SHA=${{ github.sha }}
          
          # Update auth-service image
          kubectl set image deployment/auth-service \
            auth-service=$REGISTRY/$OWNER/auth-service:$SHA \
            -n $CLUSTER_NAMESPACE || echo "Deployment not found, will create on next apply"
          
          # Update task-service image
          kubectl set image deployment/task-service \
            task-service=$REGISTRY/$OWNER/task-service:$SHA \
            -n $CLUSTER_NAMESPACE || echo "Deployment not found"
          
          # Update api-gateway image
          kubectl set image deployment/api-gateway \
            api-gateway=$REGISTRY/$OWNER/api-gateway:$SHA \
            -n $CLUSTER_NAMESPACE || echo "Deployment not found"
          
          # Update frontend image
          kubectl set image deployment/frontend \
            frontend=$REGISTRY/$OWNER/frontend:$SHA \
            -n $CLUSTER_NAMESPACE || echo "Deployment not found"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/auth-service -n $CLUSTER_NAMESPACE --timeout=5m
          kubectl rollout status deployment/task-service -n $CLUSTER_NAMESPACE --timeout=5m
          kubectl rollout status deployment/api-gateway -n $CLUSTER_NAMESPACE --timeout=5m
          kubectl rollout status deployment/frontend -n $CLUSTER_NAMESPACE --timeout=5m

      - name: Health check
        run: |
          # Get API gateway service IP
          kubectl get svc api-gateway -n $CLUSTER_NAMESPACE
          
          # Wait for service to be ready
          kubectl wait --for=condition=ready pod -l app=api-gateway -n $CLUSTER_NAMESPACE --timeout=60s

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, rolling back..."
          kubectl rollout undo deployment/auth-service -n $CLUSTER_NAMESPACE
          kubectl rollout undo deployment/task-service -n $CLUSTER_NAMESPACE
          kubectl rollout undo deployment/api-gateway -n $CLUSTER_NAMESPACE
          kubectl rollout undo deployment/frontend -n $CLUSTER_NAMESPACE
          exit 1

      - name: Smoke tests
        run: |
          # Get a pod IP or use service
          GATEWAY_IP=$(kubectl get svc api-gateway -n $CLUSTER_NAMESPACE -o jsonpath='{.spec.clusterIP}')
          
          # Test API gateway health
          kubectl run smoke-test --image=curlimages/curl:latest --restart=Never \
            -n $CLUSTER_NAMESPACE -- \
            curl -f http://$GATEWAY_IP:8000/health || true

      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Deployed commit: ${{ github.sha }}"
          echo "Environment: https://taskscheduler.example.com"

  blue-green-ready:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Verify green environment
        run: |
          echo "Blue-green deployment complete."
          echo "Ready for traffic switch."
          echo "Trigger manual traffic switch if needed."
