name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/services/**"
      - ".github/workflows/backend-ci.yaml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/services/**"

env:
  REGISTRY: ghcr.io

jobs:
  auth-service:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend/services/auth-service
          pip install uv
          uv sync

      - name: Lint
        run: |
          cd backend/services/auth-service
          uv run ruff check src/ tests/ main.py || true

      - name: Run tests
        run: |
          cd backend/services/auth-service
          uv run pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/services/auth-service/coverage.xml
          flags: auth-service

  task-service:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend/services/task-service
          pip install uv
          uv sync

      - name: Lint
        run: |
          cd backend/services/task-service
          uv run ruff check src/ tests/ main.py || true

      - name: Run tests
        run: |
          cd backend/services/task-service
          uv run pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/services/task-service/coverage.xml
          flags: task-service

  api-gateway:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend/services/api-gateway
          pip install uv
          uv sync

      - name: Lint
        run: |
          cd backend/services/api-gateway
          uv run ruff check src/ tests/ main.py || true

      - name: Run tests
        run: |
          cd backend/services/api-gateway
          uv run pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/services/api-gateway/coverage.xml
          flags: api-gateway

  build-images:
    runs-on: ubuntu-latest
    needs: [auth-service, task-service, api-gateway]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: backend/services/auth-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/auth-service:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push task-service
        uses: docker/build-push-action@v5
        with:
          context: backend/services/task-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/task-service:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/task-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: backend/services/api-gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/api-gateway:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
